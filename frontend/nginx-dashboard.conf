# PayDash - React + PHP API
# Place this inside your existing server block, or use as a separate location block.
#
# Assumes:
#   - dist/ is built to: /var/www/html/BiteTechsystems/yo-new/newdashboard/dist/
#   - API lives at:       /var/www/html/BiteTechsystems/yo-new/newdashboard/api/api.php
#   - You want the dashboard served at: /dashboard/
#
# Add these location blocks inside your existing server {} block in bitetech.conf

# Serve PHP API FIRST (more specific path must come before the SPA catch-all)
location /paydash/api/ {
    root /var/www/html/BiteTechsystems/yo-new/newdashboard;
    try_files $uri =404;

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_index api.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

# Serve the React SPA — must come AFTER the API block
location /paydash/ {
    root /var/www/html/BiteTechsystems/yo-new/newdashboard/dist;
    try_files $uri $uri/ /paydash/index.html;
}
