# -*- text -*-
#
# Onlifi FreeRADIUS Central Database Queries
# 
# These queries run against the central database (onlifi_central)
# to look up NAS/router information and tenant details.
#
# Place this file at: /etc/freeradius/3.0/mods-config/sql/main/mysql/queries.conf
#

#
# Historical NAS/client lookup query.
# Dynamic/public routers now use the shared client in clients.conf because
# FreeRADIUS cannot choose per-router secrets from NAS-Identifier before packet
# decoding. Tenant/site routing still uses NAS-Identifier in multi_tenant.pl.
#
client_query = "\
    SELECT n.id, \
           n.nasname, \
           n.shortname, \
           n.type, \
           n.secret, \
           n.server, \
           n.community, \
           n.description \
    FROM nas n \
    JOIN tenants t ON n.tenant_id = t.id \
    WHERE n.router_identifier = '%{NAS-Identifier}' \
    AND t.is_active = 1 \
    AND t.status = 'approved'"

#
# Tenant lookup query
# Returns tenant database credentials based on NAS-Identifier
# This is used by the Perl module to connect to the correct tenant database
#
tenant_lookup_query = "\
    SELECT t.id as tenant_id, \
           t.name as tenant_name, \
           t.database_name, \
           t.database_host, \
           t.database_port, \
           t.database_username, \
           t.database_password, \
           n.secret as nas_secret, \
           n.site_id, \
           n.shortname as router_name \
    FROM nas n \
    JOIN tenants t ON n.tenant_id = t.id \
    WHERE n.router_identifier = '%{NAS-Identifier}' \
    AND t.is_active = 1 \
    AND t.status = 'approved' \
    LIMIT 1"

