# -*- text -*-
#
# Onlifi FreeRADIUS Tenant Database Queries
# 
# These queries run against tenant-specific databases to:
# - Authenticate users (voucher codes)
# - Get reply attributes (speed limits, session timeout, data limits)
# - Record accounting data (session start/stop/update)
# - Log authentication attempts
#
# Place this file at: /etc/freeradius/3.0/mods-config/sql/main/mysql/queries_tenant.conf
#

#
# Authorization: Check if voucher exists and get password
# Queries the vouchers table directly for authentication
#
authorize_check_query = "\
    SELECT v.id, \
           v.voucher_code as username, \
           'Cleartext-Password' as attribute, \
           ':=' as op, \
           v.password as value \
    FROM vouchers v \
    WHERE v.voucher_code = '%{SQL-User-Name}' \
    AND v.status IN ('unused', 'used') \
    AND (v.expires_at IS NULL OR v.expires_at > DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR)) \
    LIMIT 1"

#
# Authorization: Get reply attributes for the voucher
# Returns MikroTik-specific attributes for speed/data limits
#
authorize_reply_query = "\
    SELECT v.voucher_code as username, \
           'Session-Timeout' as attribute, \
           '=' as op, \
           CAST(GREATEST(0, (v.validity_hours * 3600) - COALESCE(v.total_session_time_minutes * 60, 0)) AS CHAR) as value \
    FROM vouchers v \
    WHERE v.voucher_code = '%{SQL-User-Name}' \
    AND v.status IN ('unused', 'used') \
    UNION ALL \
    SELECT v.voucher_code as username, \
           'Mikrotik-Rate-Limit' as attribute, \
           '=' as op, \
           CONCAT(COALESCE(v.speed_limit_kbps, 2048), 'k/', COALESCE(v.speed_limit_kbps, 2048), 'k') as value \
    FROM vouchers v \
    WHERE v.voucher_code = '%{SQL-User-Name}' \
    AND v.status IN ('unused', 'used') \
    AND v.speed_limit_kbps IS NOT NULL \
    UNION ALL \
    SELECT v.voucher_code as username, \
           'Mikrotik-Total-Limit' as attribute, \
           '=' as op, \
           CAST(GREATEST(0, (COALESCE(v.data_limit_mb, 0) - COALESCE(v.total_data_used_mb, 0)) * 1048576) AS CHAR) as value \
    FROM vouchers v \
    WHERE v.voucher_code = '%{SQL-User-Name}' \
    AND v.status IN ('unused', 'used') \
    AND v.data_limit_mb IS NOT NULL \
    AND v.data_limit_mb > 0"

#
# Group check query - not used (vouchers don't use groups)
#
authorize_group_check_query = ""

#
# Group reply query - not used
#
authorize_group_reply_query = ""

#
# Accounting Start: Mark voucher as used, record session start
#
accounting_start_query = "\
    UPDATE vouchers SET \
        status = 'used', \
        first_used_at = COALESCE(first_used_at, DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR)), \
        last_used_at = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        used_by_mac = '%{Calling-Station-Id}', \
        used_by_ip = '%{Framed-IP-Address}' \
    WHERE voucher_code = '%{SQL-User-Name}'"

accounting_start_query_alt = "\
    UPDATE vouchers SET \
        status = 'used', \
        first_used_at = COALESCE(first_used_at, DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR)), \
        last_used_at = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        used_by_mac = '%{Calling-Station-Id}', \
        used_by_ip = '%{Framed-IP-Address}' \
    WHERE voucher_code = '%{SQL-User-Name}'"

#
# Accounting Update (Interim): Update session time and data usage
#
accounting_update_query = "\
    UPDATE vouchers SET \
        last_used_at = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        total_session_time_minutes = FLOOR(%{Acct-Session-Time:-0} / 60), \
        total_data_used_mb = ROUND((%{Acct-Input-Octets:-0} + %{Acct-Output-Octets:-0}) / 1048576, 2) \
    WHERE voucher_code = '%{SQL-User-Name}'"

accounting_update_query_alt = "\
    UPDATE vouchers SET \
        last_used_at = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        total_session_time_minutes = FLOOR(%{Acct-Session-Time:-0} / 60), \
        total_data_used_mb = ROUND((%{Acct-Input-Octets:-0} + %{Acct-Output-Octets:-0}) / 1048576, 2) \
    WHERE voucher_code = '%{SQL-User-Name}'"

#
# Accounting Stop: Final update when session ends
# Also checks if voucher should be marked as expired
#
accounting_stop_query = "\
    UPDATE vouchers SET \
        last_used_at = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        total_session_time_minutes = FLOOR(%{Acct-Session-Time:-0} / 60), \
        total_data_used_mb = ROUND((%{Acct-Input-Octets:-0} + %{Acct-Output-Octets:-0}) / 1048576, 2), \
        status = CASE \
            WHEN FLOOR(%{Acct-Session-Time:-0} / 60) >= (validity_hours * 60) THEN 'expired' \
            WHEN data_limit_mb IS NOT NULL AND \
                 ROUND((%{Acct-Input-Octets:-0} + %{Acct-Output-Octets:-0}) / 1048576, 2) >= data_limit_mb \
            THEN 'expired' \
            ELSE status \
        END \
    WHERE voucher_code = '%{SQL-User-Name}'"

accounting_stop_query_alt = "\
    UPDATE vouchers SET \
        last_used_at = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        total_session_time_minutes = FLOOR(%{Acct-Session-Time:-0} / 60), \
        total_data_used_mb = ROUND((%{Acct-Input-Octets:-0} + %{Acct-Output-Octets:-0}) / 1048576, 2), \
        status = CASE \
            WHEN FLOOR(%{Acct-Session-Time:-0} / 60) >= (validity_hours * 60) THEN 'expired' \
            WHEN data_limit_mb IS NOT NULL AND \
                 ROUND((%{Acct-Input-Octets:-0} + %{Acct-Output-Octets:-0}) / 1048576, 2) >= data_limit_mb \
            THEN 'expired' \
            ELSE status \
        END \
    WHERE voucher_code = '%{SQL-User-Name}'"

#
# Accounting On/Off (NAS reboot) - not used
#
accounting_onoff_query = ""

#
# Insert into radacct table for session history
#
accounting_start_query_radacct = "\
    INSERT INTO radacct \
        (acctsessionid, acctuniqueid, username, nasipaddress, nasportid, \
         nasporttype, acctstarttime, acctauthentic, \
         calledstationid, callingstationid, servicetype, \
         framedprotocol, framedipaddress, acctterminatecause) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
         '%{NAS-IP-Address}', '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
         DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), '%{Acct-Authentic}', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', '%{Service-Type}', \
         '%{Framed-Protocol}', '%{Framed-IP-Address}', '')"

accounting_stop_query_radacct = "\
    UPDATE radacct SET \
        acctstoptime = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        acctsessiontime = %{Acct-Session-Time:-0}, \
        acctinputoctets = %{Acct-Input-Octets:-0}, \
        acctoutputoctets = %{Acct-Output-Octets:-0}, \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        acctupdatetime = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR) \
    WHERE acctuniqueid = '%{Acct-Unique-Session-Id}'"

accounting_update_query_radacct = "\
    UPDATE radacct SET \
        acctupdatetime = DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR), \
        acctsessiontime = %{Acct-Session-Time:-0}, \
        acctinputoctets = %{Acct-Input-Octets:-0}, \
        acctoutputoctets = %{Acct-Output-Octets:-0} \
    WHERE acctuniqueid = '%{Acct-Unique-Session-Id}'"

#
# Post-authentication logging
#
post-auth_query = "\
    INSERT INTO radpostauth (username, pass, reply, authdate) \
    VALUES ('%{SQL-User-Name}', '%{User-Password}', '%{reply:Packet-Type}', DATE_ADD(UTC_TIMESTAMP(), INTERVAL 3 HOUR))"
