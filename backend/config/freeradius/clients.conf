# -*- text -*-
#
# Onlifi FreeRADIUS Client Configuration
# 
# This file configures FreeRADIUS to load NAS clients dynamically from the database.
# Each MikroTik router is identified by its System Identity (NAS-Identifier).
#
# Place this file at: /etc/freeradius/3.0/clients.conf
#

# Default client for testing (localhost)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

# Allow connections from any IP - we validate by NAS-Identifier and secret
# This is necessary because MikroTik routers may have dynamic IPs
# 
# NOTE: Dynamic clients are loaded from the SQL database via the sql module
# The sql module's read_clients = yes setting handles this automatically
# No explicit dynamic_clients configuration is needed here
