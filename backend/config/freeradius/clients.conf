# -*- text -*-
#
# Onlifi FreeRADIUS Client Configuration
# 
# Dynamic/public MikroTik routers cannot use per-router RADIUS secrets because
# FreeRADIUS must choose the client secret by source IP before NAS-Identifier is
# decoded. Use one shared secret here, then route tenants/sites by NAS-Identifier
# in the Perl module.
#
# Place this file at: /etc/freeradius/3.0/clients.conf
#

# Default client for testing (localhost)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

# Allow dynamic MikroTik routers from any IPv4 source.
# Replace this value with the same RADIUS_SHARED_SECRET used by Laravel and
# provisioned into MikroTik routers.
client onlifi_dynamic_routers {
    ipaddr = 0.0.0.0
    netmask = 0
    secret = Onlifi26A
    require_message_authenticator = no
    nas_type = other
}
