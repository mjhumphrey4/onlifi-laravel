# -*- text -*-
#
# Onlifi FreeRADIUS Client Configuration
# 
# This file configures FreeRADIUS to load NAS clients dynamically from the database.
# Each MikroTik router is identified by its System Identity (NAS-Identifier).
#
# Place this file at: /etc/freeradius/3.0/clients.conf
#

# Default client for testing (localhost)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

# Allow connections from any IP - we validate by NAS-Identifier and secret
# This is necessary because MikroTik routers don't have public IPs
client dynamic_clients {
    ipaddr = 0.0.0.0/0
    
    # Dynamic client lookup - FreeRADIUS will query the database
    # to find the correct secret for each NAS-Identifier
    dynamic_clients = yes
    
    # Lifetime of cached client entries (in seconds)
    lifetime = 3600
    
    # Rate limit for new client lookups
    rate_limit = no
}

# IPv6 support (if needed)
client dynamic_clients_ipv6 {
    ipaddr = ::/0
    dynamic_clients = yes
    lifetime = 3600
}
