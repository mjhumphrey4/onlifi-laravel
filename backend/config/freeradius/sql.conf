# -*- text -*-
#
# Onlifi FreeRADIUS SQL Module Configuration
# 
# This configuration enables multi-tenant RADIUS authentication where:
# - Each MikroTik router has a unique RADIUS secret
# - Routers are identified by their System Identity (NAS-Identifier)
# - Each tenant has their own database with radcheck/radreply tables
#
# Place this file at: /etc/freeradius/3.0/mods-available/sql
#

sql {
    driver = "rlm_sql_mysql"
    dialect = "mysql"
    
    # Central database connection (for NAS/client lookup)
    server = "localhost"
    port = 3306
    login = "radius_user"
    password = "${ENV_RADIUS_DB_PASSWORD}"
    radius_db = "onlifi_central"
    
    # Connection pool settings
    pool {
        start = 5
        min = 4
        max = 32
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }
    
    # Read NAS clients dynamically from database
    # This allows each router to have its own unique secret
    read_clients = yes
    
    # Client query - looks up NAS by NAS-Identifier (MikroTik Identity)
    # Returns the unique secret for this specific router
    client_query = "\
        SELECT n.id, \
               n.nasname, \
               n.shortname, \
               n.type, \
               n.secret, \
               n.server, \
               n.community, \
               n.description \
        FROM nas n \
        JOIN tenants t ON n.tenant_id = t.id \
        WHERE n.router_identifier = '%{NAS-Identifier}' \
        AND t.is_active = 1 \
        AND t.status = 'approved'"
    
    # Table names (used by standard queries)
    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    
    # Include query definitions
    $INCLUDE ${modconfdir}/${.:name}/main/${dialect}/queries.conf
}

#
# NOTE: Tenant database queries are handled by the Perl module (multi_tenant.pl)
# The Perl module connects directly to tenant databases based on NAS-Identifier
# No second SQL instance is needed here.
#
