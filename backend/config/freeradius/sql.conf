# FreeRADIUS SQL Configuration for OnLiFi Multi-Tenant
# Place this in /etc/freeradius/3.0/mods-available/sql

sql {
    driver = "rlm_sql_mysql"
    dialect = "mysql"
    
    # Central database for NAS lookup
    server = "localhost"
    port = 3306
    login = "radius_user"
    password = "your_secure_password"
    radius_db = "onlifi_central"
    
    # Read NAS clients from central database
    read_clients = yes
    client_table = "nas"
    
    # These will be overridden by the perl module for multi-tenant
    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    
    pool {
        start = 5
        min = 4
        max = 32
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }
    
    # Custom query to get tenant database from NAS
    # This is used by the authorize section
    authorize_check_query = "\
        SELECT id, username, attribute, value, op \
        FROM ${authcheck_table} \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY id"
    
    authorize_reply_query = "\
        SELECT id, username, attribute, value, op \
        FROM ${authreply_table} \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY id"
}

# NOTE: For true multi-tenant support, you need a custom Perl or Python module
# that switches databases based on NAS-IP-Address.
# See: config/freeradius/multi_tenant.pl
