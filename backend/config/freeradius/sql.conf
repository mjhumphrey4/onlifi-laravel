# -*- text -*-
#
# Onlifi FreeRADIUS SQL Module Configuration
#
# IMPORTANT:
# The current production setup does not require this SQL module.
# OnLiFi routes authentication/accounting through the Perl module
# (`mods-available/perl` + `multi_tenant.pl`) so each request can be sent to
# the correct tenant/site database by NAS-Identifier.
#
# Keep `mods-enabled/sql` removed unless you are deliberately debugging
# FreeRADIUS SQL support. If enabled accidentally, FreeRADIUS parses the stock
# MySQL query files and can fail before the OnLiFi Perl module loads.
#
# Optional location: /etc/freeradius/3.0/mods-available/sql
#

sql {
    driver = "rlm_sql_mysql"
    dialect = "mysql"
    
    # Central database connection (for NAS/client lookup)
    server = "localhost"
    port = 3306
    login = "radius_user"
    # FreeRADIUS treats ${...} as a config reference, not a shell env var.
    # Use a literal password here if you intentionally enable this optional
    # module, and keep it matched with the radius_user DB password.
    password = "onlifi@rad26"
    radius_db = "onlifi_central"
    
    # Connection pool settings
    pool {
        start = 5
        min = 4
        max = 32
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }
    
    # Do not read RADIUS clients from the nas table for dynamic routers.
    # FreeRADIUS chooses the client secret by source IP before it can inspect
    # NAS-Identifier, so per-router secrets do not work for dynamic/public IPs.
    # clients.conf contains one shared onlifi_dynamic_routers client instead.
    read_clients = no

    # The stock MySQL queries.conf references ${client_table} while parsing,
    # even when read_clients=no. Keep this defined so accidental SQL enablement
    # does not fail with: Reference "${client_table}" not found.
    client_table = "nas"
    
    # Retained for future VPN/static-IP mode only. Not used while read_clients=no.
    client_query = "\
        SELECT n.id, \
               n.nasname, \
               n.shortname, \
               n.type, \
               n.secret, \
               n.server, \
               n.community, \
               n.description \
        FROM nas n \
        JOIN tenants t ON n.tenant_id = t.id \
        WHERE t.is_active = 1 \
        AND t.status = 'approved'"
    
    # Table names (used by standard queries)
    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    
    # Include query definitions
    $INCLUDE ${modconfdir}/${.:name}/main/${dialect}/queries.conf
}

#
# NOTE: Tenant database queries are handled by the Perl module (multi_tenant.pl)
# The Perl module connects directly to tenant databases based on NAS-Identifier
# No second SQL instance is needed here.
#
